<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
    color: #1a1a1a;
  }
  .detail {
    padding: 0;
  }
  .detail-image {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: contain;
    background: #f5f5f5;
    display: block;
  }
  .detail-body {
    padding: 1rem;
  }
  .detail-title {
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.3;
    margin: 0 0 0.5rem 0;
  }
  .detail-description {
    font-size: 0.95rem;
    color: #555;
    line-height: 1.6;
    margin: 0 0 1rem 0;
    white-space: pre-wrap;
  }
  .detail-price {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0 0 1rem 0;
  }
  .detail-cta {
    display: block;
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    font-weight: 600;
    color: #1F2633;
    background: #00C2C2;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s ease;
  }
  .detail-cta:hover {
    background: #00a8a8;
  }
  .detail-cta:disabled {
    background: #e0e0e0;
    color: #666;
    cursor: not-allowed;
  }
</style>
<div class="detail" id="root">
  <p style="color:#666; padding:1rem;">Loading…</p>
</div>

<script>
  if (window.openai?.requestDisplayMode) {
    window.openai.requestDisplayMode({ mode: "fullscreen" });
  }

  const escape = (s) => {
    if (s == null) return "";
    const t = String(s);
    return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  };

  const formatPrice = (amount, currency) => {
    if (amount == null || currency == null) return "";
    const code = String(currency).toUpperCase();
    const zeroDecimal = ["jpy", "krw", "vnd"].includes(code.toLowerCase());
    const value = zeroDecimal ? amount : amount / 100;
    try {
      const locale = code === "USD" ? "en-US" : undefined;
      return new Intl.NumberFormat(locale, { style: "currency", currency: code }).format(value);
    } catch {
      return zeroDecimal ? `${code} ${value}` : `${code} ${value.toFixed(2)}`;
    }
  };

  const render = (product) => {
    if (!product) return;
    const root = document.getElementById("root");
    const title = escape(product.title ?? product.name ?? "");
    const description = escape(product.description ?? "");
    const priceFormatted = formatPrice(product.amount, product.currency);
    const imageUrl = product.image && /^https?:\/\//i.test(String(product.image))
      ? String(product.image).replace(/"/g, "&quot;")
      : null;
    const imgHtml = imageUrl
      ? `<img class="detail-image" src="${imageUrl}" alt="${title}">`
      : "";
    const hasPrice = product.priceId != null && String(product.priceId).trim() !== "";

    root.innerHTML = `
      ${imgHtml}
      <div class="detail-body">
        <h1 class="detail-title">${title}</h1>
        ${description ? `<p class="detail-description">${description}</p>` : ""}
        ${priceFormatted ? `<p class="detail-price">${escape(priceFormatted)}</p>` : ""}
        <button type="button" class="detail-cta" id="detail-cta"
          data-price-id="${escape(product.priceId ?? "")}"
          ${hasPrice ? "" : "disabled"}>${hasPrice ? "Add to cart" : "Price on request"}</button>
      </div>
    `;
  };

  const toolOutput = window.openai?.toolOutput;
  if (toolOutput) render(toolOutput);

  window.addEventListener("openai:set_globals", (event) => {
    const product = event.detail?.globals?.toolOutput;
    if (product) render(product);
  }, { passive: true });

  window.addEventListener("message", (event) => {
    if (event.source !== window.parent) return;
    const msg = event.data;
    if (!msg || msg.jsonrpc !== "2.0") return;
    if (msg.method !== "ui/notifications/tool-result") return;
    const product = msg.params?.structuredContent;
    if (product) render(product);
  }, { passive: true });
</script>
