<style>
  .carousel {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    padding: 0.5rem 0;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .carousel::-webkit-scrollbar {
    height: 6px;
  }
  .carousel::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 3px;
  }
  .carousel-card {
    flex: 0 0 auto;
    width: 200px;
    scroll-snap-align: start;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: system-ui, -apple-system, sans-serif;
    cursor: pointer;
  }
  .carousel-card-image {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #f5f5f5;
  }
  .carousel-card-body {
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .carousel-card-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin: 0 0 0.35rem 0;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .carousel-card-description {
    font-size: 0.85rem;
    color: #555;
    margin: 0 0 0.35rem 0;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }
  .carousel-card-price {
    font-size: 0.9rem;
    font-weight: 600;
    color: inherit;
    margin: 0 0 0.5rem 0;
  }
  .carousel-card-cta {
    display: inline-block;
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    font-weight: 600;
    color: #1F2633;
    background: #00C2C2;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s ease;
    margin-top: auto;
  }
  .carousel-card-cta:hover {
    background: #00a8a8;
  }
  .carousel-card-cta:disabled {
    background: #e0e0e0;
    color: #666;
    cursor: not-allowed;
  }
  .carousel-card-image-wrap {
    display: block;
    width: 100%;
    pointer-events: none;
  }
  .fullscreen-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    flex-direction: column;
  }
  .fullscreen-overlay.is-open {
    display: flex;
  }
  .fullscreen-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }
  .fullscreen-close {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    padding: 0;
    border: none;
    background: #f0f0f0;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.25rem;
    line-height: 1;
    color: #333;
  }
  .fullscreen-close:hover {
    background: #e0e0e0;
  }
  .fullscreen-close:focus {
    outline: 2px solid #00C2C2;
    outline-offset: 2px;
  }
  .fullscreen-header-title {
    font-size: 1rem;
    font-weight: 600;
    margin: 0;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fullscreen-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .fullscreen-image {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    background: #f5f5f5;
    display: block;
  }
  .fullscreen-details {
    padding: 1rem;
  }
  .fullscreen-title {
    font-size: 1.25rem;
    font-weight: 600;
    margin: 0 0 0.5rem 0;
    line-height: 1.3;
  }
  .fullscreen-description {
    font-size: 0.95rem;
    color: #555;
    line-height: 1.5;
    margin: 0 0 1rem 0;
    white-space: pre-wrap;
  }
  .fullscreen-price {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0;
  }
  .fullscreen-footer {
    flex-shrink: 0;
    padding: 0.75rem 1rem;
    border-top: 1px solid #e0e0e0;
  }
  .fullscreen-footer .carousel-card-cta {
    display: block;
    width: 100%;
  }
</style>
<div id="root">
  <p style="color:#666; font-family: system-ui, sans-serif;">Loading…</p>
</div>
<div id="product-fullscreen" class="fullscreen-overlay" role="dialog" aria-modal="true" aria-labelledby="fullscreen-header-title">
  <div class="fullscreen-header">
    <h2 id="fullscreen-header-title" class="fullscreen-header-title"></h2>
    <button type="button" class="fullscreen-close" aria-label="Close">&#x2715;</button>
  </div>
  <div class="fullscreen-body">
    <img class="fullscreen-image" id="fullscreen-image" alt="" src="">
    <div class="fullscreen-details">
      <h3 id="fullscreen-title" class="fullscreen-title"></h3>
      <p class="fullscreen-description" id="fullscreen-description"></p>
      <p class="fullscreen-price" id="fullscreen-price"></p>
    </div>
  </div>
  <div class="fullscreen-footer">
    <button type="button" class="carousel-card-cta" id="fullscreen-cta">Add to cart</button>
  </div>
</div>

<script>
  const escape = (s) => {
    if (s == null) return "";
    const t = String(s);
    return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  };

  const formatPrice = (amount, currency) => {
    if (amount == null || currency == null) return "";
    const code = String(currency).toUpperCase();
    const zeroDecimal = ["jpy", "krw", "vnd"].includes(code.toLowerCase());
    const value = zeroDecimal ? amount : amount / 100;
    try {
      const locale = code === "USD" ? "en-US" : undefined;
      return new Intl.NumberFormat(locale, {
        style: "currency",
        currency: code,
      }).format(value);
    } catch {
      return zeroDecimal ? `${code} ${value}` : `${code} ${value.toFixed(2)}`;
    }
  };

  let currentProducts = [];

  const renderCard = (product, index) => {
    const title = escape(product.title ?? product.name ?? "");
    const description = escape(product.description ?? "");
    const priceFormatted = formatPrice(product.amount, product.currency);
    const priceHtml = priceFormatted
      ? `<p class="carousel-card-price">${escape(priceFormatted)}</p>`
      : "";
    const imageUrl = product.image && /^https?:\/\//i.test(String(product.image))
      ? String(product.image).replace(/"/g, "&quot;")
      : null;
    const imgContent = imageUrl
      ? `<img class="carousel-card-image" src="${imageUrl}" alt="${title}" loading="lazy">`
      : `<div class="carousel-card-image" aria-hidden="true"></div>`;
    const imgHtml = `<div class="carousel-card-image-wrap">${imgContent}</div>`;
    return `
      <div class="carousel-card" data-product-index="${index}" role="button" tabindex="0" aria-label="View details for ${title}">
        ${imgHtml}
        <div class="carousel-card-body">
          <h3 class="carousel-card-title">${title}</h3>
          ${description ? `<p class="carousel-card-description">${description}</p>` : ""}
          ${priceHtml}
          <button type="button" class="carousel-card-cta" data-price-id="${escape(product.priceId ?? "")}">Add to cart</button>
        </div>
      </div>
    `;
  };

  const openFullscreen = (product) => {
    const overlay = document.getElementById("product-fullscreen");
    const headerTitle = document.getElementById("fullscreen-header-title");
    const titleEl = document.getElementById("fullscreen-title");
    const imageEl = document.getElementById("fullscreen-image");
    const descEl = document.getElementById("fullscreen-description");
    const priceEl = document.getElementById("fullscreen-price");
    const ctaEl = document.getElementById("fullscreen-cta");
    const title = product.title ?? product.name ?? "";
    headerTitle.textContent = title;
    titleEl.textContent = title;
    const imageUrl = product.image && /^https?:\/\//i.test(String(product.image)) ? product.image : "";
    imageEl.src = imageUrl;
    imageEl.alt = title;
    imageEl.style.display = imageUrl ? "block" : "none";
    descEl.textContent = product.description ?? "";
    descEl.style.display = descEl.textContent ? "block" : "none";
    const priceFormatted = formatPrice(product.amount, product.currency);
    priceEl.textContent = priceFormatted || "";
    priceEl.style.display = priceFormatted ? "block" : "none";
    const hasPrice = product.priceId != null && String(product.priceId).trim() !== "";
    ctaEl.textContent = hasPrice ? "Add to cart" : "Price on request";
    ctaEl.disabled = !hasPrice;
    ctaEl.dataset.priceId = product.priceId ?? "";
    overlay.classList.add("is-open");
    document.body.style.overflow = "hidden";
  };

  const closeFullscreen = () => {
    document.getElementById("product-fullscreen").classList.remove("is-open");
    document.body.style.overflow = "";
  };

  const renderCarousel = (products) => {
    const root = document.getElementById("root");
    const list = Array.isArray(products) ? products : [];
    currentProducts = list;
    if (list.length === 0) {
      root.innerHTML = "<p style='color:#666; font-family: system-ui, sans-serif;'>No products in this category.</p>";
      return;
    }
    root.innerHTML = `
      <div class="carousel" role="list">
        ${list.map((p, i) => renderCard(p, i)).join("")}
      </div>
    `;
    root.querySelectorAll(".carousel-card").forEach((card) => {
      const openDetail = () => {
        const index = parseInt(card.dataset.productIndex, 10);
        const product = currentProducts[index];
        if (product) openFullscreen(product);
      };
      card.addEventListener("click", (e) => {
        if (e.target.closest(".carousel-card-cta")) return;
        openDetail();
      });
      card.addEventListener("keydown", (e) => {
        if (e.target.closest(".carousel-card-cta")) return;
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openDetail();
        }
      });
    });
    root.querySelectorAll(".carousel-card-cta").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        // Placeholder: Add to cart — no functionality yet
      });
    });
  };

  document.querySelector(".fullscreen-close")?.addEventListener("click", closeFullscreen);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && document.getElementById("product-fullscreen")?.classList.contains("is-open")) {
      closeFullscreen();
    }
  });

  const handleSetGlobal = (event) => {
    const globals = event.detail?.globals;
    if (!globals?.toolOutput?.products) return;
    const { products } = globals.toolOutput;
    renderCarousel(products);
  };

  window.addEventListener("openai:set_globals", handleSetGlobal, {
    passive: true,
  });
</script>
