<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  .carousel-wrapper {
    position: relative;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Edge fade gradients */
  .carousel-wrapper::before,
  .carousel-wrapper::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 32px;
    z-index: 2;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .carousel-wrapper::before {
    left: 0;
    background: linear-gradient(to right, #fff 0%, transparent 100%);
    opacity: 0;
  }
  .carousel-wrapper::after {
    right: 0;
    background: linear-gradient(to left, #fff 0%, transparent 100%);
    opacity: 0;
  }
  .carousel-wrapper.can-scroll-left::before { opacity: 1; }
  .carousel-wrapper.can-scroll-right::after { opacity: 1; }

  .carousel {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 8px 4px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    scrollbar-width: none;          /* Firefox */
    -ms-overflow-style: none;       /* IE / Edge */
  }
  .carousel::-webkit-scrollbar { display: none; }

  /* Arrow buttons */
  .carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-60%);
    z-index: 3;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid #e0e0e0;
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease, box-shadow 0.2s ease;
    padding: 0;
    color: #333;
  }
  .carousel-arrow:hover {
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.18);
  }
  .carousel-arrow:disabled {
    opacity: 0;
    pointer-events: none;
  }
  .carousel-arrow--left  { left: -4px; }
  .carousel-arrow--right { right: -4px; }
  .carousel-arrow svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Dot indicators – larger hit area so they're reliably clickable/tappable */
  .carousel-dots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    padding: 12px 0 4px;
    flex-shrink: 0;
  }
  .carousel-dot {
    width: 28px;
    height: 28px;
    padding: 0;
    border: none;
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    transition: transform 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .carousel-dot::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d0d0d0;
    pointer-events: none;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .carousel-dot:hover::before {
    background: #b0b0b0;
  }
  .carousel-dot:focus-visible {
    outline: 2px solid #00C2C2;
    outline-offset: 2px;
  }
  .carousel-dot.active::before {
    background: #00C2C2;
    transform: scale(1.25);
  }
  .carousel-dot.active:hover::before {
    background: #00a8a8;
  }

  /* Cards */
  .carousel-card {
    flex: 0 0 auto;
    width: 200px;
    scroll-snap-align: start;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: system-ui, -apple-system, sans-serif;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .carousel-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
  }
  .carousel-card-image {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #f5f5f5;
  }
  .carousel-card-image-wrap {
    display: block;
    width: 100%;
    pointer-events: none;
  }
  .carousel-card-body {
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .carousel-card-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin: 0 0 0.35rem 0;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .carousel-card-description {
    font-size: 0.85rem;
    color: #555;
    margin: 0 0 0.35rem 0;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }
  .carousel-card-price {
    font-size: 0.9rem;
    font-weight: 600;
    color: inherit;
    margin: 0 0 0.5rem 0;
  }
  .carousel-card-cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    font-weight: 600;
    color: #1F2633;
    background: #00C2C2;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s ease;
    margin-top: auto;
  }
  .carousel-card-cta .cta-icon,
  .detail-modal .detail-cta .cta-icon {
    display: inline-flex;
    width: 1em;
    height: 1em;
    flex-shrink: 0;
  }
  .carousel-card-cta .cta-icon svg,
  .detail-modal .detail-cta .cta-icon svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
    stroke: none;
  }
  .carousel-card-cta:hover {
    background: #00a8a8;
  }
  .carousel-card-cta:disabled {
    background: #e0e0e0;
    color: #666;
    cursor: not-allowed;
  }

  /* Product detail modal – full screen, no vertical scroll */
  .detail-modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #fff;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    animation: detail-modal-fade 0.2s ease;
  }
  .detail-modal-backdrop[aria-hidden="true"] {
    display: none;
  }
  @keyframes detail-modal-fade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .detail-modal {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    position: relative;
    animation: detail-modal-scale 0.25s ease;
  }
  .detail-modal .detail-modal-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  @keyframes detail-modal-scale {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .detail-modal-close {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 2;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0, 0, 0, 0.06);
    color: #333;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.15s ease;
  }
  .detail-modal-close:hover {
    background: rgba(0, 0, 0, 0.12);
  }
  .detail-modal-close svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
  }
  .detail-modal .detail-image-wrap {
    flex: 0 0 auto;
    width: 100%;
    max-height: 45vh;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .detail-modal .detail-image {
    width: 100%;
    height: 100%;
    max-height: 45vh;
    object-fit: contain;
    display: block;
  }
  .detail-modal .detail-body {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 1rem 1.25rem 1.25rem;
    overflow: hidden;
  }
  .detail-modal .detail-title {
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.3;
    margin: 0 0 0.5rem 0;
    padding-right: 2.5rem;
    flex-shrink: 0;
  }
  .detail-modal .detail-description {
    font-size: 0.95rem;
    color: #555;
    line-height: 1.6;
    margin: 0 0 1rem 0;
    white-space: pre-wrap;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    flex: 1;
    min-height: 0;
  }
  .detail-modal .detail-price {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0 0 1rem 0;
    flex-shrink: 0;
  }
  .detail-modal .detail-cta {
    flex-shrink: 0;
    display: block;
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    font-weight: 600;
    color: #1F2633;
    background: #00C2C2;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s ease;
  }
  .detail-modal .detail-cta:hover {
    background: #00a8a8;
  }
  .detail-modal .detail-cta:disabled {
    background: #e0e0e0;
    color: #666;
    cursor: not-allowed;
  }

  /* Cart summary bar */
  .cart-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.65rem 1rem;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    margin-top: 0.75rem;
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
  }
  .cart-info {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.95rem;
    font-weight: 600;
    color: #1a1a1a;
  }
  .cart-icon svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    vertical-align: middle;
  }
  .cart-separator {
    color: #999;
    font-weight: 400;
  }
  .cart-checkout-btn {
    padding: 0.5rem 1.25rem;
    font-size: 0.9rem;
    font-weight: 600;
    color: #1F2633;
    background: #00C2C2;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s ease;
    white-space: nowrap;
  }
  .cart-checkout-btn:hover {
    background: #00a8a8;
  }
  .cart-checkout-btn:disabled {
    background: #e0e0e0;
    color: #999;
    cursor: not-allowed;
  }

  /* "Added" state for Add to cart buttons */
  .carousel-card-cta.added {
    background: #e6fafa;
    color: #00a8a8;
    cursor: default;
  }
</style>
<div id="root">
  <p style="color:#666; font-family: system-ui, sans-serif;">Loading…</p>
</div>

<script>
  const escape = (s) => {
    if (s == null) return "";
    const t = String(s);
    return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  };

  const formatPrice = (amount, currency) => {
    if (amount == null || currency == null) return "";
    const code = String(currency).toUpperCase();
    const zeroDecimal = ["jpy", "krw", "vnd"].includes(code.toLowerCase());
    const value = zeroDecimal ? amount : amount / 100;
    try {
      const locale = code === "USD" ? "en-US" : undefined;
      return new Intl.NumberFormat(locale, {
        style: "currency",
        currency: code,
      }).format(value);
    } catch {
      return zeroDecimal ? `${code} ${value}` : `${code} ${value.toFixed(2)}`;
    }
  };

  let currentProducts = [];

  // ── Cart state (persisted via widgetState, hydrated from server) ──
  const cart = { id: null, items: [], currency: "usd" };

  function persistWidgetState() {
    if (window.openai?.setWidgetState) {
      window.openai.setWidgetState({ cartId: cart.id, cartCurrency: cart.currency });
    }
  }

  function restoreFromWidgetState() {
    const ws = window.openai?.widgetState;
    if (ws?.cartId) {
      cart.id = ws.cartId;
      cart.currency = ws.cartCurrency || "usd";
    }
  }

  function tryReadCartFromMeta() {
    const meta = window.openai?.toolResponseMetadata;
    if (meta?.cart && Array.isArray(meta.cart.items)) {
      applyCartData(meta.cart, false);
    }
  }

  function loadCartFromServerIfNeeded() {
    if (!cart.id || cart.items.length > 0 || !window.openai?.callTool) return;
    window.openai.callTool("get-current-cart", { cartId: cart.id });
  }

  restoreFromWidgetState();
  tryReadCartFromMeta();
  loadCartFromServerIfNeeded();

  function generateCartId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  const CART_SVG = '<svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>';
  const ADD_TO_CART_HTML = `<span class="cta-icon">${CART_SVG}</span> Add to cart`;

  function updateCartSummary() {
    const bar = document.getElementById("cart-summary");
    if (!bar) return;
    const count = cart.items.length;
    const subtotal = cart.items.reduce((s, i) => s + (i.amount ?? 0), 0);
    const cur = cart.currency || "usd";
    const priceStr = formatPrice(subtotal, cur) || "$0.00";
    bar.querySelector(".cart-count").textContent = `${count} item${count !== 1 ? "s" : ""}`;
    bar.querySelector(".cart-total").textContent = priceStr;
    const btn = bar.querySelector(".cart-checkout-btn");
    btn.disabled = count === 0;
  }

  function applyCartData(data, persist) {
    if (!data) return;
    cart.id = data.cartId ?? cart.id;
    cart.items = Array.isArray(data.items) ? data.items : [];
    cart.currency = data.currency || cart.currency;
    if (persist) persistWidgetState();
    updateCartSummary();
  }

  function addToCart(product, triggerBtn) {
    if (!cart.id) cart.id = generateCartId();
    cart.items.push({
      priceId: product.priceId,
      title: product.title ?? product.name ?? "",
      amount: product.amount ?? 0,
      currency: product.currency ?? "usd",
    });
    if (product.currency) cart.currency = product.currency;
    persistWidgetState();
    updateCartSummary();

    if (triggerBtn) {
      triggerBtn.innerHTML = "✓ Added";
      triggerBtn.classList.add("added");
      triggerBtn.disabled = true;
      setTimeout(() => {
        triggerBtn.innerHTML = ADD_TO_CART_HTML;
        triggerBtn.classList.remove("added");
        triggerBtn.disabled = false;
      }, 1500);
    }

    if (window.openai?.callTool) {
      window.openai.callTool("add-to-cart", {
        cartId: cart.id,
        priceId: product.priceId ?? "",
        title: product.title ?? product.name ?? "",
        amount: product.amount ?? null,
        currency: product.currency ?? null,
      });
    }
  }

  async function checkout() {
    if (cart.items.length === 0) return;
    if (!window.openai?.callTool) return;
    const priceIds = cart.items.map((i) => i.priceId).filter(Boolean);
    try {
      const result = await window.openai.callTool("buy-products", {
        priceIds,
        cartId: cart.id,
      });
      const url =
        result?.structuredContent?.checkoutSessionUrl ??
        result?.checkoutSessionUrl;
      if (url && typeof url === "string") {
        if (window.openai?.openExternal) {
          window.openai.openExternal({ href: url });
        } else {
          window.open(url, "_top");
        }
      }
    } finally {
      cart.id = null;
      cart.items = [];
      cart.currency = "usd";
      persistWidgetState();
      updateCartSummary();
    }
  }

  const renderCard = (product, index) => {
    const title = escape(product.title ?? product.name ?? "");
    const description = escape(product.description ?? "");
    const priceFormatted = formatPrice(product.amount, product.currency);
    const priceHtml = priceFormatted
      ? `<p class="carousel-card-price">${escape(priceFormatted)}</p>`
      : "";
    const imageUrl = product.image && /^https?:\/\//i.test(String(product.image))
      ? String(product.image).replace(/"/g, "&quot;")
      : null;
    const imgContent = imageUrl
      ? `<img class="carousel-card-image" src="${imageUrl}" alt="${title}" loading="lazy">`
      : `<div class="carousel-card-image" aria-hidden="true"></div>`;
    const imgHtml = `<div class="carousel-card-image-wrap">${imgContent}</div>`;
    return `
      <div class="carousel-card" data-product-index="${index}" role="button" tabindex="0" aria-label="View details for ${title}">
        ${imgHtml}
        <div class="carousel-card-body">
          <h3 class="carousel-card-title">${title}</h3>
          ${description ? `<p class="carousel-card-description">${description}</p>` : ""}
          ${priceHtml}
          <button type="button" class="carousel-card-cta" data-price-id="${escape(product.priceId ?? "")}">${ADD_TO_CART_HTML}</button>
        </div>
      </div>
    `;
  };

  const CLOSE_SVG = '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

  /** Renders product into the detail modal (same layout as product-detail widget). */
  function renderDetailContent(container, product) {
    if (!container || !product) return;
    const title = escape(product.title ?? product.name ?? "");
    const description = escape(product.description ?? "");
    const priceFormatted = formatPrice(product.amount, product.currency);
    const imageUrl = product.image && /^https?:\/\//i.test(String(product.image))
      ? String(product.image).replace(/"/g, "&quot;")
      : null;
    const imgHtml = imageUrl
      ? `<div class="detail-image-wrap"><img class="detail-image" src="${imageUrl}" alt="${title}"></div>`
      : "";
    const hasPrice = product.priceId != null && String(product.priceId).trim() !== "";
    container.innerHTML = `
      ${imgHtml}
      <div class="detail-body">
        <h1 class="detail-title" id="detail-modal-title">${title}</h1>
        ${description ? `<p class="detail-description">${description}</p>` : ""}
        ${priceFormatted ? `<p class="detail-price">${escape(priceFormatted)}</p>` : ""}
        <button type="button" class="detail-cta" data-price-id="${escape(product.priceId ?? "")}"
          ${hasPrice ? "" : "disabled"}>${hasPrice ? ADD_TO_CART_HTML : "Price on request"}</button>
      </div>
    `;
    const cta = container.querySelector(".detail-cta");
    if (cta && !cta.disabled) {
      cta.addEventListener("click", (e) => {
        e.stopPropagation();
        addToCart(product, null);
        closeProductModal();
      });
    }
  }

  function closeProductModal() {
    const backdrop = document.querySelector(".detail-modal-backdrop");
    if (!backdrop) return;
    backdrop.setAttribute("aria-hidden", "true");
    const content = backdrop.querySelector(".detail-modal-content");
    if (content) content.innerHTML = "";
  }

  function openProductDetail(product) {
    const root = document.getElementById("root");
    let backdrop = root.querySelector(".detail-modal-backdrop");
    if (!backdrop) {
      backdrop = document.createElement("div");
      backdrop.className = "detail-modal-backdrop";
      backdrop.setAttribute("aria-hidden", "true");
      backdrop.innerHTML = `
        <div class="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title">
          <button type="button" class="detail-modal-close" aria-label="Close">${CLOSE_SVG}</button>
          <div class="detail-modal-content"></div>
        </div>
      `;
      backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeProductModal(); });
      backdrop.querySelector(".detail-modal-close").addEventListener("click", closeProductModal);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && backdrop.getAttribute("aria-hidden") !== "true") closeProductModal();
      });
      root.appendChild(backdrop);
    }
    const content = root.querySelector(".detail-modal-content");
    renderDetailContent(content, product);
    backdrop.setAttribute("aria-hidden", "false");
    if (window.openai?.callTool) {
      window.openai.callTool("view-product-detail", {
        priceId: product.priceId ?? null,
        title: product.title ?? product.name ?? "",
        description: product.description ?? "",
        image: product.image ?? null,
        amount: product.amount ?? null,
        currency: product.currency ?? null,
      });
    }
  }

  const ARROW_LEFT_SVG = '<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>';
  const ARROW_RIGHT_SVG = '<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>';

  function updateScrollState(wrapper, track, leftBtn, rightBtn, dots) {
    const scrollLeft = track.scrollLeft;
    const maxScroll = track.scrollWidth - track.clientWidth;
    const atStart = scrollLeft <= 2;
    const atEnd = scrollLeft >= maxScroll - 2;

    leftBtn.disabled = atStart;
    rightBtn.disabled = atEnd;
    wrapper.classList.toggle("can-scroll-left", !atStart);
    wrapper.classList.toggle("can-scroll-right", !atEnd);

    if (dots.length > 0) {
      const cardWidth = 200 + 16; // card width + gap
      const activeIndex = Math.round(scrollLeft / cardWidth);
      dots.forEach((dot, i) => dot.classList.toggle("active", i === activeIndex));
    }
  }

  const renderCarousel = (products) => {
    const root = document.getElementById("root");
    const list = Array.isArray(products) ? products : [];
    currentProducts = list;
    if (list.length === 0) {
      root.innerHTML = "<p style='color:#666; font-family: system-ui, sans-serif;'>No products in this category.</p>";
      return;
    }

    const dotCount = list.length;
    const dotsHtml = dotCount > 1
      ? `<div class="carousel-dots">${list.map((_, i) => `<button class="carousel-dot${i === 0 ? " active" : ""}" data-dot-index="${i}" aria-label="Go to product ${i + 1}"></button>`).join("")}</div>`
      : "";

    const cartCount = cart.items.length;
    const cartSubtotal = cart.items.reduce((s, i) => s + (i.amount ?? 0), 0);
    const cartCur = cart.currency || "usd";
    const cartPriceStr = formatPrice(cartSubtotal, cartCur) || "$0.00";

    root.innerHTML = `
      <div class="carousel-wrapper">
        <button class="carousel-arrow carousel-arrow--left" aria-label="Previous" disabled>${ARROW_LEFT_SVG}</button>
        <div class="carousel" role="list">
          ${list.map((p, i) => renderCard(p, i)).join("")}
        </div>
        <button class="carousel-arrow carousel-arrow--right" aria-label="Next">${ARROW_RIGHT_SVG}</button>
      </div>
      ${dotsHtml}
      <div id="cart-summary" class="cart-summary">
        <div class="cart-info">
          <span class="cart-icon">${CART_SVG}</span>
          <span class="cart-count">${cartCount} item${cartCount !== 1 ? "s" : ""}</span>
          <span class="cart-separator">&middot;</span>
          <span class="cart-total">${cartPriceStr}</span>
        </div>
        <button type="button" class="cart-checkout-btn" ${cartCount === 0 ? "disabled" : ""}>Checkout &rarr;</button>
      </div>
    `;

    const wrapper = root.querySelector(".carousel-wrapper");
    const track = root.querySelector(".carousel");
    const leftBtn = root.querySelector(".carousel-arrow--left");
    const rightBtn = root.querySelector(".carousel-arrow--right");
    const dots = Array.from(root.querySelectorAll(".carousel-dot"));
    const cardWidth = 200 + 16; // card + gap

    // Arrow click handlers: scroll by one visible "page" of cards
    const scrollAmount = () => {
      const visible = Math.max(1, Math.floor(track.clientWidth / cardWidth));
      return visible * cardWidth;
    };
    leftBtn.addEventListener("click", () => { track.scrollBy({ left: -scrollAmount(), behavior: "smooth" }); });
    rightBtn.addEventListener("click", () => { track.scrollBy({ left: scrollAmount(), behavior: "smooth" }); });

    // Dot click handler: scroll to that card
    dots.forEach((dot) => {
      dot.addEventListener("click", () => {
        const idx = parseInt(dot.dataset.dotIndex, 10);
        track.scrollTo({ left: idx * cardWidth, behavior: "smooth" });
      });
    });

    // Update arrow/dot state on scroll
    let scrollRaf = 0;
    track.addEventListener("scroll", () => {
      cancelAnimationFrame(scrollRaf);
      scrollRaf = requestAnimationFrame(() => updateScrollState(wrapper, track, leftBtn, rightBtn, dots));
    }, { passive: true });

    // Initial state
    requestAnimationFrame(() => updateScrollState(wrapper, track, leftBtn, rightBtn, dots));

    // Card click/keyboard handlers
    root.querySelectorAll(".carousel-card").forEach((card) => {
      const openDetail = () => {
        const index = parseInt(card.dataset.productIndex, 10);
        const product = currentProducts[index];
        if (product) openProductDetail(product);
      };
      card.addEventListener("click", (e) => {
        if (e.target.closest(".carousel-card-cta")) return;
        openDetail();
      });
      card.addEventListener("keydown", (e) => {
        if (e.target.closest(".carousel-card-cta")) return;
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openDetail();
        }
      });
    });
    root.querySelectorAll(".carousel-card-cta").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const card = btn.closest(".carousel-card");
        const index = parseInt(card?.dataset.productIndex, 10);
        const product = currentProducts[index];
        if (product) addToCart(product, btn);
      });
    });

    const checkoutBtn = root.querySelector(".cart-checkout-btn");
    if (checkoutBtn) {
      checkoutBtn.addEventListener("click", checkout);
    }
  };

  let carouselRendered = false;
  const handleSetGlobal = (event) => {
    const globals = event.detail?.globals;
    if (!globals?.toolOutput) return;
    const output = globals.toolOutput;
    if (output.products && !carouselRendered) {
      carouselRendered = true;
      const metaCart = globals.toolResponseMetadata?.cart ?? globals._meta?.cart;
      if (metaCart && Array.isArray(metaCart.items) && metaCart.items.length > 0) {
        applyCartData(metaCart, false);
      }
      renderCarousel(output.products);
      loadCartFromServerIfNeeded();
    }
  };

  window.addEventListener("openai:set_globals", handleSetGlobal, {
    passive: true,
  });

  window.addEventListener("message", (event) => {
    if (event.source !== window.parent) return;
    const msg = event.data;
    if (!msg || msg.jsonrpc !== "2.0") return;
    if (msg.method !== "ui/notifications/tool-result") return;
    const params = msg.params ?? {};
    const sc = params.structuredContent;
    const metaCart = params._meta?.cart ?? params.toolResponseMetadata?.cart;
    if (sc?.products && !carouselRendered) {
      carouselRendered = true;
      if (metaCart && Array.isArray(metaCart.items) && metaCart.items.length > 0) {
        applyCartData(metaCart, false);
      }
      renderCarousel(sc.products);
      loadCartFromServerIfNeeded();
    } else if (sc && Array.isArray(sc.items)) {
      applyCartData(sc, false);
    }
  }, { passive: true });
</script>
